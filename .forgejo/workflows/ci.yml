name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  # All cargo checks in one job — cache hit + shared incremental state beats
  # one-job-per-check. jmap-mcp has no C deps, so no cmake/apt step.
  cargo:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with: { persist-credentials: false }
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: rustfmt, clippy
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --all-targets --all-features --locked -- -D warnings
      - name: test
        run: cargo test --all-features --locked
      - name: audit
        run: |
          [ -x ~/.cargo/bin/cargo-audit ] || cargo install --locked cargo-audit
          cargo audit
      - uses: EmbarkStudios/cargo-deny-action@6c8f9facfa5047ec02d8485b6bf52b587b7777d1  # v2
        with: { command: check bans licenses sources }

  # buildctl talks to Pada's buildkitd over TCP. Registry-backed layer cache.
  docker:
    runs-on: ubuntu-22.04
    needs: cargo
    permissions: { contents: read, packages: write }
    env:
      BUILDKIT_HOST: tcp://10.0.10.252:1234
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with: { persist-credentials: false }
      - name: Install buildctl
        env:
          BUILDKIT_VERSION: v0.30.0
          BUILDKIT_SHA256: 2da148c50540409988c837e62b72176e4a9ad7855548a2dd6ea1cd0c0d2d360d
        run: |
          set -euo pipefail
          TARBALL="/tmp/buildkit.tar.gz"
          curl -sSL -o "$TARBALL" \
            "https://github.com/moby/buildkit/releases/download/${BUILDKIT_VERSION}/buildkit-${BUILDKIT_VERSION}.linux-amd64.tar.gz"
          echo "${BUILDKIT_SHA256}  ${TARBALL}" | sha256sum -c -
          sudo tar -xz -C /usr/local --strip-components=0 -f "$TARBALL"
          rm -f "$TARBALL"
          buildctl --version
      - name: Login to Forgejo registry
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p ~/.docker
          F_AUTH=$(printf "%s:%s" "jlxq0" "${{ secrets.FORGE_PUSH_TOKEN }}" | base64 -w0)
          echo "{\"auths\":{\"forge.oddie.app\":{\"auth\":\"$F_AUTH\"}}}" > ~/.docker/config.json
      - name: Build (and push on tag)
        run: |
          set -euo pipefail
          CACHE_REF="forge.oddie.app/jlxq0/jmap-mcp:buildcache"
          IMPORT_CACHE_ARG=()
          EXPORT_CACHE_ARG=()
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            V="${GITHUB_REF#refs/tags/}"
            TAGS="forge.oddie.app/jlxq0/jmap-mcp:${V},forge.oddie.app/jlxq0/jmap-mcp:latest"
            PUSH=true
            IMPORT_CACHE_ARG=(--import-cache "type=registry,ref=${CACHE_REF}")
            EXPORT_CACHE_ARG=(--export-cache "type=registry,ref=${CACHE_REF},mode=max")
          elif [[ "$GITHUB_REF" == refs/heads/main ]]; then
            TAGS="forge.oddie.app/jlxq0/jmap-mcp:ci-${GITHUB_SHA::8}"
            PUSH=false
            IMPORT_CACHE_ARG=(--import-cache "type=registry,ref=${CACHE_REF}")
            EXPORT_CACHE_ARG=(--export-cache "type=registry,ref=${CACHE_REF},mode=max")
          else
            TAGS="forge.oddie.app/jlxq0/jmap-mcp:ci-${GITHUB_SHA::8}"
            PUSH=false
          fi
          buildctl build \
            --frontend dockerfile.v0 \
            --local context=. \
            --local dockerfile=. \
            "${IMPORT_CACHE_ARG[@]}" \
            "${EXPORT_CACHE_ARG[@]}" \
            --output "type=image,\"name=${TAGS}\",push=${PUSH}"
